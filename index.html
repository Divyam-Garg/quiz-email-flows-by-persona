/* ---- render ---- */
function emailCard(e, fromName){
  return `<div class="email">
    <div class="hd"><span class="tag">${e.tag}</span><span>${e.day}</span></div>
    <div class="meta-rows">
      <p class="subject">${e.subject}</p>
      <p class="preview">${e.preview}</p>
      <p class="from">${FROM}</p>
    </div>
    <div class="body">${e.body}</div>
  </div>`;
}

const nav = document.getElementById('nav');
const main = document.getElementById('main');
const keys = Object.keys(personas).concat(['universal']);

keys.forEach((k,i)=>{
  const btn = document.createElement('button');
  btn.textContent = k==='universal' ? 'Universal (E6 · E7)' : personas[k].label;
  btn.dataset.key = k;
  if(i===0) btn.classList.add('active');
  btn.onclick = ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.persona').forEach(s=>s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('p-'+k).classList.add('active');
    window.scrollTo(0,0);
  };
  nav.appendChild(btn);
});

Object.keys(personas).forEach((k,i)=>{
  const p = personas[k];
  const sec = document.createElement('section');
  sec.className = 'persona' + (i===0?' active':'');
  sec.id = 'p-'+k;
  sec.innerHTML = `<div class="persona-intro">
      <h2>${p.label}</h2>
      <div class="meta">Sample contact: <strong>${p.name}</strong> · estimate <strong>${p.est} lessons</strong> · bucket <code>${k}</code><br>Flow: E1 → E2 → E3 → E4 → E5 → <strong>E6 (survey)</strong> → <strong>E7 (final)</strong>. E6 &amp; E7 are universal — see the "Universal" tab.</div>
    </div>` + p.emails.map(e=>emailCard(e,p.name)).join('');
  main.appendChild(sec);
});

const usec = document.createElement('section');
usec.className='persona'; usec.id='p-universal';
usec.innerHTML = `<div class="persona-intro"><h2>Universal emails</h2><div class="meta">These two are the same for every persona (no branching). <code>{first name}</code> fills from the contact.</div></div>` + universal.map(e=>emailCard(e,'')).join('');
main.appendChild(usec);
</script>
